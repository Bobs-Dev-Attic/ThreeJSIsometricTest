<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Isometric RPG — Forest</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🌲</text></svg>"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <div id="hud">
        <h1>Forest Wanderer</h1>
        <p>Click or tap the ground to move</p>
      </div>
      <div id="loading">
        <div class="load-title">Loading the forest…</div>
        <div class="load-version" id="load-version"></div>
      </div>
      <div id="version-badge"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
